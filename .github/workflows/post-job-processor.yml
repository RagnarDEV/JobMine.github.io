name: Auto Post Remote Job Processor

on:
  issues:
    types: [opened]

jobs:
  process-job:
    if: contains(github.event.issue.title, 'New Job:')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Parse Issue Content & Update Jobs Data
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const issueBody = context.payload.issue.body;
            
            // استخراج البيانات القادمة من الاستمارة بدقة باستخدام الـ Regex
            const title = issueBody.match(/title:\s*"(.*?)"/)?.[1];
            const company = issueBody.match(/company:\s*"(.*?)"/)?.[1];
            const category = issueBody.match(/category:\s*"(.*?)"/)?.[1];
            const salary = issueBody.match(/salary:\s*"(.*?)"/)?.[1];
            const tags = issueBody.match(/tags:\s*"(.*?)"/)?.[1].split(', ').map(t => t.trim());
            const apply_url = issueBody.match(/apply_url:\s*"(.*?)"/)?.[1];
            const date = issueBody.match(/date:\s*"(.*?)"/)?.[1];

            if (!title || !company || !apply_url) {
              console.log("Invalid job format submission.");
              return;
            }

            const newJob = { title, company, category, salary, tags, apply_url, date };

            // مسار ملف البيانات الخارجي الذي سيحفظ الوظائف
            const filePath = './jobs.json';
            let jobsList = [];
            
            if (fs.existsSync(filePath)) {
              try {
                jobsList = JSON.parse(fs.readFileSync(filePath, 'utf8'));
              } catch (e) {
                jobsList = [];
              }
            }

            // إضافة الوظيفة الجديدة في أعلى المصفوفة لتظهر أولاً في التغذية
            jobsList.unshift(newJob);
            fs.writeFileSync(filePath, JSON.stringify(jobsList, null, 2));
            console.log(`Successfully appended: ${title} at ${company}`);

      - name: Commit and Push Updated Jobs Feed
        run: |
          git config --global user.name "JobMine Automation Bot"
          git config --global user.email "actions@github.com"
          git add jobs.json
          git commit -m "chore: dynamically injected new broadcasted remote position [skip ci]"
          git push

      - name: Auto Close Processed Issue Ticket
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "🚀 **Elite Broadcast Success!** This position has been processed via GitHub Actions and injected directly into the live global job feed. Closing ticket now."
            });
            github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
