Name: JobMine Automated Mining

on:
  schedule:
    # الاستيقاظ التلقائي المطور والأمن: يعمل كل 4 ساعات (6 مرات يومياً) للمحافظة على الباقة المحدودة
    - cron: '0 */4 * * *'
  workflow_dispatch:
    # يتيح لك خيار تشغيل البوت يدوياً للتجربة الفورية في أي وقت

permissions:
  contents: write

jobs:
  mine-jobs:
    runs-on: ubuntu-latest

    steps:
    # 1. سحب ملفات المشروع الحالية للسيرفر
    - name: Checkout Repository
      uses: actions/checkout@v3

    # 2. بناء وتجهيز بيئة لغة بايثون 
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 3. تشغيل ملف التنقيب الذكي لسحب أحدث الوظائف الحية وتوليد الخارطة والأرشيف
    - name: Run Mining Script
      run: python fetch_jobs.py
      env:
        # تمرير المفتاح السري الآمن لـ JSearch أثناء التشغيل
        RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}

    # 4. حفظ التعديلات الجديدة وتحديث ملفات البيانات والخارطة والأرشيف وعمل Push تلقائياً
    - name: Commit and Push Changes
      run: |
        git config --global user.name "JobMine Automation Bot"
        git config --global user.email "bot@jobmine.io"
        # تم تعديل السطر التالي ليشمل مجلد الأرشيف بالكامل في التتبع والرفع
        git add jobs.json sitemap.xml archive/
        if ! git diff --cached --quiet; then
          git commit -m "🤖 Automated Mine Update: Jobs, Sitemap & Archive synced [skip ci]"
          git push
        else
          echo "No new changes detected in this shift."
        fi
