name: JobMine Automated Mining

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mine-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Fetch Script
        env:
          RAPID_API_KEY: ${{ secrets.RAPID_API_KEY }}
        run: python fetch_jobs.py

      - name: Commit and Push
        run: |
          git config --global user.name 'JobMine Automation Bot'
          git config --global user.email 'bot@jobmine.site.je'
          git add jobs.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated Mine Update: Jobs, Sitemap, and Trends" && git push)
