name: JobMine Automated Mining

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  mine-jobs:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run Fetch Script
      env:
        RAPID_API_KEY: ${{ secrets.RAPID_API_KEY }}
      run: python fetch_jobs.py

    - name: Commit and Push
      run: |
        git config --global user.name 'JobMine Automation Bot'
        git config --global user.email 'actions@github.com'
        git add jobs.json sitemap.xml archive/
        git commit -m "Automated database sync: Fresh vacancies pulled [Skip CI]" || echo "No changes to commit"
        git push origin main || echo "No changes to push"
