name: JobMine Automated Mining

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *'

jobs:
  mine-jobs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run Fetch Script
      env:
        FANTASTIC_API_KEY: ${{ secrets.FANTASTIC_API_KEY }}
        RAPID_API_KEY: ${{ secrets.RAPID_API_KEY }}
      run: python fetch_jobs.py

    - name: Commit and Push
      run: |
        git config --global user.name 'JobMine Automation Bot'
        git config --global user.email 'actions@github.com'
        git add jobs.json
        git commit -m "Sync: Database updated" || echo "No changes"
        git push
